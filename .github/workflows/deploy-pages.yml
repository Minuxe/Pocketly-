name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy static site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # configure-pages is intentionally omitted — Pages source is already
      # set to "GitHub Actions" in repo Settings, so no setup step is needed.

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./Pocketly-/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
