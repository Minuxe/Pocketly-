<!--
  ═══════════════════════════════════════════════════════════
  FILE: dashboard.html (Trang Monthly - Biểu đồ chi tiêu)
  ═══════════════════════════════════════════════════════════

  MÔ TẢ:
    Trang Monthly hiển thị biểu đồ tròn (pie chart) thống kê
    chi tiêu theo từng folder. Dùng thư viện Chart.js (CDN).

  LUỒNG HOẠT ĐỘNG:
    1. Trang load → main.js kiểm tra đã đăng nhập (requireAuth)
    2. Gọi API GET /api/monthly-stats/:userId
    3. Server trả { labels, data, colors, total }
    4. main.js dùng Chart.js vẽ pie chart + legend

  CÁC PHẦN TỬ QUAN TRỌNG:
    #expense-chart     → Canvas cho Chart.js vẽ biểu đồ
    #chart-legend      → Div hiển thị chú thích (tên folder + %)
    #chart-total       → Tổng chi tiêu
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Monthly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item">Folders</a>
    <a href="dashboard.html" class="nav-item active">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ NỘI DUNG MONTHLY ════ -->
  <div class="dashboard-wrapper">

    <!-- ── Header ── -->
    <div class="dash-header">
      <h2>📊 Monthly Overview</h2>
    </div>

    <!-- ── Biểu đồ tròn (Chart.js) ── -->
    <div class="chart-card">
      <div class="chart-container">
        <canvas id="expense-chart"></canvas>
      </div>

      <!-- Chú thích: tên folder + phần trăm + số tiền -->
      <div class="chart-legend" id="chart-legend">
        <!-- JS sẽ render legend ở đây -->
      </div>

      <!-- Tổng chi tiêu -->
      <div class="chart-total" id="chart-total">
        Tổng chi tiêu: <strong>0 VNĐ</strong>
      </div>
    </div>

  </div>

  <!-- ════ NGÔI SAO TRANG TRÍ ════ -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
    <span class="star s5">★</span><span class="star s6">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Chart.js: Thư viện vẽ biểu đồ -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- main.js xử lý logic monthly (hàm initDashboard) -->
  <script src="js/main.js"></script>
</body>
</html>
