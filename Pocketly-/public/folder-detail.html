<!--
  ═══════════════════════════════════════════════════════════
  FILE: folder-detail.html (Folder Detail Page)
  ═══════════════════════════════════════════════════════════

  DESCRIPTION:
    Displays records inside a specific folder.
    URL: folder-detail.html?id=2 (id is the folder ID)

  FLOW:
    1. main.js reads ?id= from URL using URLSearchParams
    2. Loads folders from localStorage -> finds folder by id
    3. Loads records from localStorage filtered by folder_id
    4. Renders folder name + records list
    5. User can: filter by type, add record, delete record

  KEY ELEMENTS:
    #folder-detail-name   -> Folder name (updated by JS)
    #folder-detail-color  -> Folder color dot
    #filter-type          -> Dropdown to filter record type
    #btn-add-record       -> Button to add record to folder
    #records-list         -> Container displaying records
    #record-modal/form    -> Modal + form to add record
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Folder Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item active">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ FOLDER DETAIL CONTENT ════ -->
  <div class="folder-detail-wrapper">

    <!-- Header: Back button + folder name + color dot -->
    <div class="folder-detail-header">
      <a href="folders.html" class="btn-back">←</a>
      <h2 id="folder-detail-name">Folder</h2>
      <div class="folder-color-dot" id="folder-detail-color"></div>
    </div>

    <!-- Records list in folder -->
    <div class="records-section">
      <div class="records-toolbar">
        <select id="filter-type">
          <option value="">All</option>
          <option value="expense">💰 Expense</option>
          <option value="income">💵 Income</option>
          <option value="task">✅ Task</option>
          <option value="note">📝 Note</option>
          <option value="reminder">🔔 Reminder</option>
          <option value="goal">🎯 Goal</option>
          <option value="receipt">🧾 Receipt</option>
        </select>
        <button class="btn-add" id="btn-add-record">+ Add Record</button>
      </div>

      <div id="records-list">
        <div class="empty-state">
          <div class="emoji">📂</div>
          <p>Folder is empty. Add a new record!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ MODAL: ADD RECORD TO FOLDER ════
       Similar to dashboard modal but WITHOUT folder dropdown
       (record automatically belongs to current folder)
  -->
  <div class="modal-overlay" id="record-modal">
    <div class="modal-box">
      <h3 id="modal-title">Add New Record</h3>
      <form id="record-form">
        <div class="form-group">
          <label for="rec-type">Type</label>
          <select id="rec-type" required>
            <option value="expense">💰 Expense</option>
            <option value="income">💵 Income</option>
            <option value="task">✅ Task</option>
            <option value="note">📝 Note</option>
            <option value="reminder">🔔 Reminder</option>
            <option value="goal">🎯 Goal</option>
            <option value="receipt">🧾 Receipt</option>
          </select>
        </div>
        <div class="form-group">
          <label for="rec-title">Title</label>
          <input type="text" id="rec-title" required maxlength="200" placeholder="Enter title..." />
        </div>
        <div class="form-group">
          <label for="rec-content">Content / Amount</label>
          <input type="text" id="rec-content" maxlength="500" placeholder="Details..." />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="rec-date">Date</label>
            <input type="date" id="rec-date" />
          </div>
          <div class="form-group">
            <label for="rec-priority">Priority</label>
            <select id="rec-priority">
              <option value="">None</option>
              <option value="low">🟢 Low</option>
              <option value="medium">🟡 Medium</option>
              <option value="high">🔴 High</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="rec-tags">Tags <span class="label-hint">(comma separated)</span></label>
          <input type="text" id="rec-tags" maxlength="200" placeholder="e.g. food, school, monthly" />
        </div>
        <input type="hidden" id="rec-edit-id" value="" />
        <div class="modal-actions">
          <button type="button" class="btn-modal-cancel" id="btn-cancel-record">Cancel</button>
          <button type="submit" class="btn-modal-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ DECORATIVE STARS ════ -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- main.js handles folder detail logic (initFolderDetail function) -->
  <script src="js/main.js"></script>
</body>
</html>
