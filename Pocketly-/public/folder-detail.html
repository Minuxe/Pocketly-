<!--
  ═══════════════════════════════════════════════════════════
  FILE: folder-detail.html (Chi tiết 1 folder)
  ═══════════════════════════════════════════════════════════

  MÔ TẢ:
    Hiển thị records bên trong 1 folder cụ thể.
    URL: folder-detail.html?id=2 (id là ID của folder)

  LUỒNG HOẠT ĐỘNG:
    1. main.js đọc ?id= từ URL bằng URLSearchParams
    2. Gọi API GET /api/folders/:userId → tìm folder theo id
    3. Gọi API GET /api/records/:userId?folder_id=X → lấy records
    4. Render tên folder + danh sách records
    5. User có thể: filter theo loại, thêm record, xóa record

  CÁC PHẦN TỬ QUAN TRỌNG:
    #folder-detail-name   → Tên folder (JS cập nhật)
    #folder-detail-color  → Chấm màu folder
    #filter-type          → Dropdown lọc loại record
    #btn-add-record       → Nút thêm record vào folder
    #records-list         → Container hiển thị records
    #record-modal/form    → Modal + form thêm record
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Folder Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item active">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ NỘI DUNG CHI TIẾT FOLDER ════ -->
  <div class="folder-detail-wrapper">

    <!-- Header: Nút quay lại + tên folder + chấm màu -->
    <div class="folder-detail-header">
      <a href="folders.html" class="btn-back">←</a>
      <h2 id="folder-detail-name">Folder</h2>
      <div class="folder-color-dot" id="folder-detail-color"></div>
    </div>

    <!-- Danh sách records trong folder -->
    <div class="records-section">
      <div class="records-toolbar">
        <select id="filter-type">
          <option value="">Tất cả</option>
          <option value="expense">💰 Expense</option>
          <option value="task">✅ Task</option>
          <option value="note">📝 Note</option>
        </select>
        <button class="btn-add" id="btn-add-record">+ Thêm Record</button>
      </div>

      <div id="records-list">
        <div class="empty-state">
          <div class="emoji">📂</div>
          <p>Folder trống. Hãy thêm record mới!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ════ MODAL: THÊM RECORD VÀO FOLDER ════
       Giống modal ở dashboard nhưng KHÔNG có dropdown chọn folder
       (vì record tự động thuộc folder hiện tại)
  -->
  <div class="modal-overlay" id="record-modal">
    <div class="modal-box">
      <h3 id="modal-title">Thêm Record mới</h3>
      <form id="record-form">
        <div class="form-group">
          <label for="rec-type">Loại</label>
          <select id="rec-type" required>
            <option value="expense">💰 Expense</option>
            <option value="task">✅ Task</option>
            <option value="note">📝 Note</option>
          </select>
        </div>
        <div class="form-group">
          <label for="rec-title">Tiêu đề</label>
          <input type="text" id="rec-title" required maxlength="200" placeholder="Nhập tiêu đề..." />
        </div>
        <div class="form-group">
          <label for="rec-content">Nội dung / Số tiền</label>
          <input type="text" id="rec-content" maxlength="500" placeholder="Chi tiết..." />
        </div>
        <div class="form-group">
          <label for="rec-date">Ngày</label>
          <input type="date" id="rec-date" />
        </div>
        <input type="hidden" id="rec-edit-id" value="" />
        <div class="modal-actions">
          <button type="button" class="btn-modal-cancel" id="btn-cancel-record">Hủy</button>
          <button type="submit" class="btn-modal-save">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ NGÔI SAO TRANG TRÍ ════ -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- main.js xử lý logic folder detail (hàm initFolderDetail) -->
  <script src="js/main.js"></script>
</body>
</html>
