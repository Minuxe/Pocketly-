<!--
  ═══════════════════════════════════════════════════════════
  FILE: folders.html (Trang quản lý Folders)
  ═══════════════════════════════════════════════════════════

  MÔ TẢ:
    Hiển thị lưới folder (giống icon folder thật trên desktop).
    Mỗi folder có màu riêng. Ô cuối = nút "+" tạo mới.

  LUỒNG HOẠT ĐỘNG:
    1. main.js gọi GET /api/folders/:userId
    2. Render lưới folder (CSS tạo hình folder với tab + body)
    3. User click folder → chuyển tới folder-detail.html?id=X
    4. User click "+" → mở modal tạo folder mới

  CÁC PHẦN TỬ QUAN TRỌNG:
    #folder-grid    → Container lưới folder (JS render nội dung)
    #folder-search  → Input tìm folder (filter real-time ở client)
    #folder-modal   → Modal tạo folder mới
    #folder-form    → Form trong modal (tên + màu sắc)
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Folders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item active">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ NỘI DUNG FOLDERS ════ -->
  <div class="folders-wrapper">
    <h2>📁 My Folders</h2>

    <!-- Thanh tìm kiếm folder (filter ở client, không gọi API) -->
    <div class="search-bar">
      <div class="search-icon">🔍</div>
      <input type="text" id="folder-search" placeholder="Find a Folder" maxlength="100" />
    </div>

    <!-- Lưới folder: main.js render nội dung vào đây
         Mỗi folder = .folder-wrapper với --folder-color CSS variable
         CSS tạo hình thang cho .folder-tab (tai folder)
    -->
    <div class="folder-grid" id="folder-grid">
      <!-- JS sẽ render folders ở đây -->
    </div>
  </div>

  <!-- ════ NÚT FAB (Floating Action Button) ════
       Nút "+" cố định góc dưới bên phải để tạo folder mới
  -->
  <button class="fab" id="add-folder-fab" title="Tạo folder mới">+</button>

  <!-- ════ MODAL: TẠO FOLDER MỚI ════ -->
  <div class="modal-overlay" id="folder-modal">
    <div class="modal-box">
      <h3>Tạo Folder mới</h3>
      <form id="folder-form">
        <div class="form-group">
          <label for="folder-name">Tên Folder</label>
          <input type="text" id="folder-name" required maxlength="50" placeholder="Ví dụ: Education" />
        </div>
        <div class="form-group">
          <label for="folder-color">Màu sắc</label>
          <!-- input type="color" → mở color picker của trình duyệt -->
          <input type="color" id="folder-color" value="#FFB6C1" style="width:60px;height:38px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-modal-cancel" id="btn-cancel-folder">Hủy</button>
          <button type="submit" class="btn-modal-save">Tạo</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ NGÔI SAO TRANG TRÍ ════ -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
    <span class="star s5">★</span><span class="star s6">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- main.js xử lý logic folders (hàm initFoldersPage) -->
  <script src="js/main.js"></script>
</body>
</html>
