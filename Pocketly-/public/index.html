<!--
  ═══════════════════════════════════════════════════════════
  FILE: index.html (Trang chủ / Landing Page)
  ═══════════════════════════════════════════════════════════

  MÔ TẢ:
    Trang chào mừng đầu tiên khi truy cập website Pocketly.
    Hiển thị tên app + nút "Start" để chuyển tới trang Login.

  CẤU TRÚC:
    1. <head>      → Load CSS (Bootstrap + Google Fonts + style.css)
    2. <nav>       → Thanh điều hướng 5 mục (Login, Home, Logo, Folders, Monthly)
    3. <main>      → Thẻ folder card chứa tiêu đề + nút Start
    4. .stars-deco → Ngôi sao trang trí bay lơ lửng (CSS animation)
    5. <script>    → Load Bootstrap JS (cho responsive nav)

  LƯU Ý:
    - Trang này KHÔNG cần main.js (không có logic JS phức tạp)
    - class="active" trên nav-item "Home" → tô sáng mục đang chọn
    - aria-hidden="true" → ẩn stars khỏi screen reader (accessibility)
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Welcome</title>

  <!-- ── THƯ VIỆN BÊN NGOÀI (CDN) ── -->
  <!-- Bootstrap 5: Framework CSS responsive (lưới, nút, tiện ích) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts: Pacifico (script), Fredoka One (display), Nunito (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- CSS riêng của Pocketly (theme hồng Y2K) -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR (Thanh điều hướng) ════
       - 5 mục: Login | Home | Logo★ | Folders | Monthly
       - class="active" → tô sáng mục hiện tại
       - Logo ở giữa dùng SVG ngôi sao vàng
  -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item active">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
  </nav>

  <!-- ════ NỘI DUNG CHÍNH ════
       - .folder-card-container: Thẻ giống folder thật (có tab ở trên)
       - .card-tab: Tai thẻ folder (CSS tạo hình thang)
       - .card-body-main: Phần thân chứa text + nút
       - .btn-start: Nút "Start" → chuyển tới login.html
  -->
  <main class="main-wrapper">
    <div class="folder-card-container">
      <div class="card-tab"></div>
      <div class="card-body-main">
        <p class="welcome-text">Welcome to</p>
        <h1 class="pocketly-title">
          PO<span class="letter-c">C</span>KETLY
          <svg class="title-star" viewBox="0 0 24 24" width="18" height="18"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/></svg>
        </h1>
        <p class="tagline">Your cute pocket planner ✨</p>
        <a href="login.html" class="btn-start">Start</a>
      </div>
    </div>
  </main>

  <!-- ════ NGÔI SAO TRANG TRÍ ════
       - Các ngôi sao bay lơ lửng tạo hiệu ứng Y2K
       - CSS animation float-star trong style.css
       - aria-hidden="true" → ẩn khỏi screen reader
  -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span>
    <span class="star s2">☆</span>
    <span class="star s3">★</span>
    <span class="star s4">☆</span>
    <span class="star s5">★</span>
    <span class="star s6">☆</span>
    <span class="star s7">★</span>
    <span class="star s8">☆</span>
  </div>

  <!-- Bootstrap JS (cần cho một số component responsive) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
