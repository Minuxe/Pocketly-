<!--
  ═══════════════════════════════════════════════════════════
  FILE: index.html (Home / Landing Page)
  ═══════════════════════════════════════════════════════════

  DESCRIPTION:
    Welcome page shown when first visiting Pocketly website.
    Shows app name + "Start" button to navigate to Login.

  STRUCTURE:
    1. <head>      -> Load CSS (Bootstrap + Google Fonts + style.css)
    2. <nav>       -> Navigation bar with 5 items (Login, Home, Logo, Folders, Monthly)
    3. <main>      -> Folder card containing title + Start button
    4. .stars-deco -> Floating decorative stars (CSS animation)
    5. <script>    -> Load Bootstrap JS (for responsive nav)

  NOTES:
    - This page does NOT need main.js (no complex JS logic)
    - class="active" on nav-item "Home" -> highlights current page
    - aria-hidden="true" -> hides stars from screen readers (accessibility)
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Welcome</title>

  <!-- ── EXTERNAL LIBRARIES (CDN) ── -->
  <!-- Bootstrap 5: Responsive CSS framework (grid, buttons, utilities) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Google Fonts: Pacifico (script), Fredoka One (display), Nunito (body) -->
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Pocketly custom CSS (pink Y2K theme) -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR (Navigation Bar) ════
       - 5 items: Login | Home | Logo★ | Folders | Monthly
       - class="active" -> highlights current page
       - Center logo uses gold star SVG
  -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="index.html" class="nav-item active">Home</a>
    <a href="index.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
  </nav>

  <!-- ════ MAIN CONTENT ════
       - .folder-card-container: Card styled like a real folder (with tab on top)
       - .card-tab: Folder tab ear (CSS trapezoid shape)
       - .card-body-main: Body containing text + button
       - .btn-start: "Start" button -> navigates to login.html
  -->
  <main class="main-wrapper">
    <div class="folder-card-container">
      <div class="card-tab"></div>
      <div class="card-body-main">
        <p class="welcome-text">Welcome to</p>
        <h1 class="pocketly-title">
          PO<span class="letter-c">C</span>KETLY
          <svg class="title-star" viewBox="0 0 24 24" width="18" height="18"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/></svg>
        </h1>
        <p class="tagline">Your cute pocket planner ✨</p>
        <a href="login.html" class="btn-start">Start</a>
      </div>
    </div>
  </main>

  <!-- ════ DECORATIVE STARS ════
       - Floating stars create Y2K aesthetic effect
       - CSS animation float-star in style.css
       - aria-hidden="true" -> hidden from screen readers
  -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span>
    <span class="star s2">☆</span>
    <span class="star s3">★</span>
    <span class="star s4">☆</span>
    <span class="star s5">★</span>
    <span class="star s6">☆</span>
    <span class="star s7">★</span>
    <span class="star s8">☆</span>
  </div>

  <!-- Bootstrap JS (needed for some responsive components) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
