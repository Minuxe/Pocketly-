<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item active">Login</a>
    <a href="index.html" class="nav-item">Home</a>
    <a href="index.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
  </nav>

  <!-- ════ LOGIN / REGISTER ════ -->
  <main class="main-wrapper">
    <div class="auth-container">
      <div class="auth-card">

        <!-- LOGIN FORM -->
        <div id="login-section">
          <h2>Welcome back!</h2>
          <p class="subtitle">Đăng nhập vào Pocketly của bạn ✨</p>

          <div id="login-error" class="auth-error"></div>

          <form id="login-form" autocomplete="off">
            <div class="form-group">
              <label for="login-username">Username</label>
              <input type="text" id="login-username" name="username" required
                     minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+"
                     placeholder="Nhập username..." />
            </div>
            <div class="form-group">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" name="password" required
                     minlength="6" maxlength="100"
                     placeholder="Nhập password..." />
            </div>
            <button type="submit" class="btn-auth">Đăng nhập</button>
          </form>

          <p class="auth-switch">
            Chưa có tài khoản? <a href="#" id="show-register">Đăng ký ngay</a>
          </p>
        </div>

        <!-- REGISTER FORM (hidden by default) -->
        <div id="register-section" style="display:none;">
          <h2>Tạo tài khoản</h2>
          <p class="subtitle">Bắt đầu hành trình với Pocketly 🌟</p>

          <div id="register-error" class="auth-error"></div>
          <div id="register-success" class="auth-success"></div>

          <form id="register-form" autocomplete="off">
            <div class="form-group">
              <label for="reg-username">Username</label>
              <input type="text" id="reg-username" name="username" required
                     minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+"
                     title="Chỉ chứa chữ cái, số và dấu gạch dưới (3-30 ký tự)"
                     placeholder="Chọn username..." />
            </div>
            <div class="form-group">
              <label for="reg-password">Password</label>
              <input type="password" id="reg-password" name="password" required
                     minlength="6" maxlength="100"
                     placeholder="Tối thiểu 6 ký tự..." />
            </div>
            <div class="form-group">
              <label for="reg-password2">Nhập lại Password</label>
              <input type="password" id="reg-password2" required
                     minlength="6" maxlength="100"
                     placeholder="Xác nhận password..." />
            </div>
            <button type="submit" class="btn-auth">Đăng ký</button>
          </form>

          <p class="auth-switch">
            Đã có tài khoản? <a href="#" id="show-login">Đăng nhập</a>
          </p>
        </div>

      </div>
    </div>
  </main>

  <!-- Stars decoration -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
    <span class="star s5">★</span><span class="star s6">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
