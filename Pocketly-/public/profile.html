<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- JsBarcode for generating unique barcodes -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="index.html" class="nav-item">Home</a>
    <a href="index.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ PROFILE ID CARD ════ -->
  <div class="profile-wrapper">
    <div>
      <!-- 3D Flip Card -->
      <div class="id-card-scene">
        <div class="id-card" id="id-card">
          <!-- FRONT -->
          <div class="id-card-front">
            <div class="avatar-frame" id="avatar-frame">
              <div class="avatar-placeholder" id="avatar-placeholder">👤</div>
            </div>
            <div class="card-info-right">
              <div class="card-org">★ POCKETLY STUDENT ID ★</div>
              <div class="info-grid">
                <div class="info-field">
                  <label>Name</label>
                  <div class="value" id="profile-name">—</div>
                </div>
                <div class="info-field">
                  <label>Birthday</label>
                  <div class="value" id="profile-birthday">—</div>
                </div>
                <div class="info-field">
                  <label>Gender</label>
                  <div class="value" id="profile-gender">—</div>
                </div>
                <div class="info-field">
                  <label>School</label>
                  <div class="value" id="profile-school">—</div>
                </div>
                <div class="info-field">
                  <label>City</label>
                  <div class="value" id="profile-city">—</div>
                </div>
                <div class="info-field">
                  <label>Year Level</label>
                  <div class="value" id="profile-year">—</div>
                </div>
                <div class="barcode-area">
                  <svg id="barcode"></svg>
                </div>
              </div>
            </div>
          </div>
          <!-- BACK -->
          <div class="id-card-back">
            <p class="quote-text" id="profile-quote">"Stay curious, stay kind ✨"</p>
            <p class="flip-hint">↻ Hover to flip back</p>
          </div>
        </div>
      </div>

      <!-- Edit button -->
      <div class="text-center mt-3">
        <button class="btn-edit-profile" id="btn-edit-profile">✏️ Edit Profile</button>
      </div>
    </div>
  </div>

  <!-- ════ MODAL: Edit Profile ════ -->
  <div class="modal-overlay" id="profile-modal">
    <div class="modal-box">
      <h3>Chỉnh sửa Profile</h3>
      <form id="profile-form">
        <div class="form-group">
          <label for="edit-fullname">Full Name</label>
          <input type="text" id="edit-fullname" maxlength="100" placeholder="Tên đầy đủ..." />
        </div>
        <div class="form-group">
          <label for="edit-birthday">Birthday</label>
          <input type="date" id="edit-birthday" />
        </div>
        <div class="form-group">
          <label for="edit-gender">Gender</label>
          <select id="edit-gender">
            <option value="">-- Chọn --</option>
            <option value="Female">Female</option>
            <option value="Male">Male</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-school">School</label>
          <input type="text" id="edit-school" maxlength="100" placeholder="Tên trường..." />
        </div>
        <div class="form-group">
          <label for="edit-city">City</label>
          <input type="text" id="edit-city" maxlength="50" placeholder="Thành phố..." />
        </div>
        <div class="form-group">
          <label for="edit-year">Year Level</label>
          <input type="text" id="edit-year" maxlength="20" placeholder="Ví dụ: 12" />
        </div>
        <div class="form-group">
          <label for="edit-avatar">Avatar</label>
          <select id="edit-avatar">
            <option value="avatar_1.png">Avatar 1 🧑</option>
            <option value="avatar_2.png">Avatar 2 👩</option>
            <option value="avatar_3.png">Avatar 3 🧒</option>
            <option value="avatar_4.png">Avatar 4 👦</option>
            <option value="avatar_5.png">Avatar 5 👧</option>
          </select>
        </div>
        <div class="form-group">
          <label for="edit-quote">Câu trích dẫn yêu thích</label>
          <input type="text" id="edit-quote" maxlength="200" placeholder="Stay curious..." />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-modal-cancel" id="btn-cancel-profile">Hủy</button>
          <button type="submit" class="btn-modal-save">Lưu</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Stars decoration -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
    <span class="star s5">★</span><span class="star s6">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
