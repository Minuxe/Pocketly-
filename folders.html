<!--
  ═══════════════════════════════════════════════════════════
  FILE: folders.html (Folders Management Page)
  ═══════════════════════════════════════════════════════════

  DESCRIPTION:
    Displays folder grid (like desktop folder icons).
    Each folder has its own color. Last cell = "+" to create new.

  FLOW:
    1. main.js loads folders from localStorage
    2. Renders folder grid (CSS shapes with tab + body)
    3. User clicks folder -> navigates to folder-detail.html?id=X
    4. User clicks "+" -> opens create folder modal

  KEY ELEMENTS:
    #folder-grid    -> Folder grid container (JS renders content)
    #folder-search  -> Search input (client-side real-time filter)
    #folder-modal   -> Create new folder modal
    #folder-form    -> Form in modal (name + color)
  ═══════════════════════════════════════════════════════════
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pocketly - Folders</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="pocketly-bg">

  <!-- ════ NAVBAR ════ -->
  <nav class="pocketly-nav">
    <a href="login.html" class="nav-item">Login</a>
    <a href="profile.html" class="nav-item">Home</a>
    <a href="profile.html" class="nav-item nav-logo">
      <svg class="star-icon" viewBox="0 0 24 24" width="28" height="28"><polygon points="12,2 15,9 22,9 17,14 18.5,21 12,17 5.5,21 7,14 2,9 9,9" fill="#FFD700" stroke="#FFA500" stroke-width="1"/></svg>
    </a>
    <a href="folders.html" class="nav-item active">Folders</a>
    <a href="dashboard.html" class="nav-item">Monthly</a>
    <button class="logout-btn" id="logout-btn">Logout</button>
  </nav>

  <!-- ════ FOLDERS CONTENT ════ -->
  <div class="folders-wrapper">
    <h2>📁 My Folders</h2>

    <!-- Search bar (client-side filter) -->
    <div class="search-bar">
      <div class="search-icon">🔍</div>
      <input type="text" id="folder-search" placeholder="Find a Folder" maxlength="100" />
    </div>

    <!-- Folder grid: main.js renders content here
         Each folder = .folder-wrapper with --folder-color CSS variable
         CSS creates trapezoid shape for .folder-tab (folder ear)
    -->
    <div class="folder-grid" id="folder-grid">
      <!-- JS will render folders here -->
    </div>
  </div>

  <!-- ════ FAB (Floating Action Button) ════
       Fixed "+" button at bottom-right to create new folder
  -->
  <button class="fab" id="add-folder-fab" title="Create new folder">+</button>

  <!-- ════ MODAL: CREATE NEW FOLDER ════ -->
  <div class="modal-overlay" id="folder-modal">
    <div class="modal-box">
      <h3>Create New Folder</h3>
      <form id="folder-form">
        <div class="form-group">
          <label for="folder-name">Folder Name</label>
          <input type="text" id="folder-name" required maxlength="50" placeholder="e.g. Education" />
        </div>
        <div class="form-group">
          <label for="folder-color">Color</label>
          <!-- input type="color" -> opens browser color picker -->
          <input type="color" id="folder-color" value="#FFB6C1" style="width:60px;height:38px;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;" />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-modal-cancel" id="btn-cancel-folder">Cancel</button>
          <button type="submit" class="btn-modal-save">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ════ DECORATIVE STARS ════ -->
  <div class="stars-deco" aria-hidden="true">
    <span class="star s1">★</span><span class="star s2">☆</span>
    <span class="star s3">★</span><span class="star s4">☆</span>
    <span class="star s5">★</span><span class="star s6">☆</span>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- main.js handles folders logic (initFoldersPage function) -->
  <script src="js/main.js"></script>
</body>
</html>
